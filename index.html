<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pearlyirl — YouTube stats</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial; display:flex; align-items:center; justify-content:center; min-height:100vh; background:#0f1724; color:#e6eef8; margin:0 }
    .card { background:#0b1220; padding:20px; border-radius:12px; box-shadow:0 8px 30px rgba(2,6,23,0.6); width:320px }
    .header { display:flex; gap:12px; align-items:center }
    .avatar { width:64px; height:64px; border-radius:8px; object-fit:cover }
    .title { font-weight:700; font-size:1.1rem }
    .subtitle { color:#9fb0c9; font-size:0.85rem }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:16px }
    .stat { text-align:center }
    .stat .num { font-weight:700; font-size:1.05rem }
    .muted { color:#84a0bf; font-size:0.8rem }
    .note { margin-top:12px; font-size:0.75rem; color:#6f8aa6 }
  </style>
</head>
<body>
  <div class="card" id="card">Loading YouTube stats…</div>
  <script src="/static/stats.js"></script>
</body>
</html>
